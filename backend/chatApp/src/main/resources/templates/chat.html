<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.2.0/bundles/stomp.umd.min.js"></script>
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">Real-Time Chat Application</h1>

    <div id="chat"
         class="border rounded p-3 mb-3 bg-light"
         style="height: 350px; overflow-y: auto;">
    </div>

    <div class="mb-3">
        <input
                id="senderInput"
                type="text"
                class="form-control"
                placeholder="Enter your name">
    </div>

    <div class="input-group">
        <input
                id="messageInput"
                type="text"
                class="form-control"
                placeholder="Type your message">

        <button
                id="SendMessage"
                class="btn btn-primary"
                type="button">
            Send
        </button>
    </div>

</div>

<script>

    let stompClient = null;

    function setConnected(connected) {
        document.getElementById("SendMessage").disabled = !connected;
    }

    function connect() {

        const socket = new SockJS("https://synctalk-production-8eba.up.railway.app")

        // STOMP v7
        stompClient = new StompJs.Client({
            webSocketFactory: () => socket,

            onConnect: (frame) => {

                console.log("Connected:", frame);

                setConnected(true);

                stompClient.subscribe('/topic/message', (message) => {
    showMessage(JSON.parse(message.body));
});
            },

            onStompError: (frame) => {
                console.error("Broker Error:", frame);
            },

            onWebSocketError: (error) => {
                console.error("WebSocket Error:", error);
            }
        });

        stompClient.activate();
    }

    function showMessage(message) {

        const chat = document.getElementById("chat");

        const messageElement = document.createElement("div");

        messageElement.className =
            "border-bottom p-2 mb-1";

        messageElement.textContent =
            message.sender + ": " + message.content;

        chat.appendChild(messageElement);

        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {

        const sender =
            document.getElementById("senderInput").value.trim();

        const content =
            document.getElementById("messageInput").value.trim();

        if (!sender || !content) {
            return;
        }

        const chatMessage = {
            sender: sender,
            content: content
        };

        stompClient.publish({
            destination: "/app/sendMessage",
            body: JSON.stringify(chatMessage)
        });

        document.getElementById("messageInput").value = "";
    }

    document
        .getElementById("SendMessage")
        .addEventListener("click", sendMessage);

    window.onload = connect;

</script>

</body>
</html>
